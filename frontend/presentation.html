<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Next Demo - Live Visualization</title>
    <link rel="stylesheet" href="style.css">
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            projectId: "venema-2026-1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const containerGrid = document.getElementById("container-grid");

        const instanceToSlot = new Map();
        // Array of slot elements that are currently empty
        const availableSlots = [];
        let totalActive = 0;

        function createSlot() {
            const slot = document.createElement("div");
            slot.className = "container-box empty";
            containerGrid.appendChild(slot);
            return slot;
        }

        function updateGridLayout() {
            const activeCount = instanceToSlot.size;
            const slotCount = containerGrid.children.length;

            // Target a 16:9 aspect ratio for the grid cells
            const aspectRatio = 16 / 9;
            
            // Calculate optimal columns and rows for the current total slots
            let cols = Math.ceil(Math.sqrt(slotCount * aspectRatio));
            let rows = Math.ceil(slotCount / cols);

            // Ensure a minimum grid size for aesthetics (10x6)
            const minCols = 10;
            const minRows = 6;
            
            const finalCols = Math.max(minCols, cols);
            const finalRows = Math.max(minRows, rows);

            containerGrid.style.setProperty('--cols', finalCols);
            containerGrid.style.setProperty('--rows', finalRows);
        }

        // Initialize with minimum slots (10x6 = 60)
        for (let i = 0; i < 60; i++) {
            availableSlots.push(createSlot());
        }
        updateGridLayout();

        // Listen to Firestore real-time updates
        onSnapshot(collection(db, "active_containers"), (snapshot) => {
            snapshot.docChanges().forEach((change) => {
                const data = change.doc.data();
                const id = change.doc.id;

                if (change.type === "added") {
                    totalActive++;
                    let slot;
                    if (availableSlots.length > 0) {
                        slot = availableSlots.shift();
                        slot.classList.remove("empty");
                    } else {
                        slot = createSlot();
                        slot.classList.remove("empty");
                    }
                    
                    instanceToSlot.set(id, slot);
                    updateSlot(slot, data, true);
                    updateGridLayout();
                }
                
                if (change.type === "modified") {
                    const slot = instanceToSlot.get(id);
                    if (slot) {
                        updateSlot(slot, data, false);
                    }
                }
                
                if (change.type === "removed") {
                    totalActive--;
                    const slot = instanceToSlot.get(id);
                    if (slot) {
                        clearSlot(slot);
                        instanceToSlot.delete(id);
                        availableSlots.push(slot);
                    }
                }
            });
        });

        function updateSlot(slot, data, isNew) {
            const statusClass = data.status === 'idle' ? 'status-idle' : 'status-connected';
            slot.style.backgroundColor = data.color;
            slot.className = `container-box ${statusClass}`;
            
            if (isNew) slot.classList.add("pop-in");
            
            slot.innerHTML = `
                <div class="emoji">${data.emoji}</div>
                <div class="instance-id">${data.instance_id}</div>
            `;
            
            if (isNew) {
                setTimeout(() => slot.classList.remove('pop-in'), 600);
            }
        }

        function clearSlot(slot) {
            slot.classList.add('exit');
            setTimeout(() => {
                slot.innerHTML = "";
                slot.style.backgroundColor = "transparent";
                slot.className = "container-box empty";
                // Reset styles that might have been set by the exit class
                slot.style.opacity = "";
                slot.style.transform = "";
                slot.style.filter = "";
            }, 500);
        }

        // Periodic reflow: clean up empty slots every minute
        setInterval(() => {
            console.log("Reflowing grid: removing empty slots.");
            while (availableSlots.length > 0) {
                const slot = availableSlots.shift();
                if (slot.parentNode === containerGrid) {
                    slot.remove();
                }
            }
        }, 60000);
    </script>
</head>
<body class="presentation">
    <main>
        <div id="container-grid" class="grid">
            <!-- Slots will be injected and managed here -->
        </div>
    </main>
</body>
</html>
