<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Run Instance - Attendee</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👟</text></svg>">
    
    <!-- Preload primary fonts -->
    <link rel="preload" href="vendor/fonts/e3t4euO8T-267oIAQAu6jDQyK3nVivM.woff2" as="font" type="font/woff2" crossorigin>
    <link rel="preload" href="vendor/fonts/QlddNThLqRwH-OJ1UHjlKENVzkWGVkL3GZQmAwLyya15.woff2" as="font" type="font/woff2" crossorigin>

    <script src="vendor/htmx.min.js"></script>
    <script src="vendor/ws.js"></script>
    <link rel="stylesheet" href="vendor/fonts.css">
    <link rel="stylesheet" href="style.css">
    
    <script>
        // Prevent FOUT (Flash of Unstyled Text)
        document.documentElement.classList.add('fonts-loading');
        document.fonts.ready.then(() => {
            document.documentElement.classList.remove('fonts-loading');
        });
    </script>

    <script src="connection.js"></script>
</head>
<body>
    <div class="container" id="main-container">
        <div id="setup-view">
            <h1 class="retro-header">Cloud Run Demo</h1>
            <p class="intro-text">
                Spin up a dedicated, isolated container instance on Google Cloud.
            </p>
            <button class="start-btn" onclick="startContainer()">
                START INSTANCE
            </button>
        </div>

        <div id="active-view" style="display:none;">
            <h1 class="retro-header">Instance Control</h1>
            
            <!-- Section 2: Live Preview (1:1 with dashboard) -->
            <div id="preview-wrapper">
                <div id="pulse-indicator" class="pulse-dot"></div>
                <div id="container-preview">
                    <!-- Status message shown before backend injects the real .container-box -->
                    <div id="connection-status" class="status-placeholder">Initializing terminal...</div>
                </div>
            </div>

            <!-- Section 3: Customizations -->
            <div class="section-label">Customization</div>
            <div class="controls" onclick="handleSelection(event)">
                <div class="control-group">
                    <label>Emoji</label>
                    <div class="emoji-grid">
                        <button ws-send name="emoji" value="🐶">🐶</button>
                        <button ws-send name="emoji" value="🐱">🐱</button>
                        <button ws-send name="emoji" value="🐭">🐭</button>
                        <button ws-send name="emoji" value="🐹">🐹</button>
                        <button ws-send name="emoji" value="🐰">🐰</button>
                        <button ws-send name="emoji" value="🦊">🦊</button>
                        <button ws-send name="emoji" value="🐻">🐻</button>
                        <button ws-send name="emoji" value="🐼">🐼</button>
                        <button ws-send name="emoji" value="🐻‍❄️">🐻‍❄️</button>
                        <button ws-send name="emoji" value="🐨">🐨</button>
                        <button ws-send name="emoji" value="🐯">🐯</button>
                        <button ws-send name="emoji" value="🦁">🦁</button>
                        <button ws-send name="emoji" value="🐮">🐮</button>
                        <button ws-send name="emoji" value="🦀">🦀</button>
                        <button ws-send name="emoji" value="🐸">🐸</button>
                        <button ws-send name="emoji" value="🐵">🐵</button>
                        <button ws-send name="emoji" value="🦄">🦄</button>
                        <button ws-send name="emoji" value="🐝">🐝</button>
                        <button ws-send name="emoji" value="🐙">🐙</button>
                        <button ws-send name="emoji" value="🦋">🦋</button>
                    </div>
                </div>
                <div class="control-group">
                    <label>Background color</label>
                    <div class="color-grid">
                        <button ws-send name="color" value="#1967D2" style="background-color: #1967D2;"></button>
                        <button ws-send name="color" value="#C5221F" style="background-color: #C5221F;"></button>
                        <button ws-send name="color" value="#F29900" style="background-color: #F29900;"></button>
                        <button ws-send name="color" value="#188038" style="background-color: #188038;"></button>
                    </div>
                </div>
            </div>

            <!-- Section 4: System Readout -->
            <div class="section-label">System Readout</div>
            <div id="system-readout" class="terminal-box">
                <!-- Injected by backend as terminal lines -->
                <div class="terminal-line">Initializing...</div>
            </div>
        </div>
    </div>
</body>
</html>
